<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Kalkulyator + Klaviatura</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            font-family: 'Segoe UI', sans-serif;
        }
        
        .calculator {
            background-color: #1e1e1e;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0px 15px 35px rgba(0, 0, 0, 0.5);
            width: 320px;
            border: 1px solid #333;
        }
        
        #display {
            width: 100%;
            height: 70px;
            font-size: 2.2rem;
            text-align: right;
            margin-bottom: 20px;
            padding: 15px;
            box-sizing: border-box;
            border: none;
            border-radius: 12px;
            background: #2d2d2d;
            color: #00ff88;
            /* Chiroyli yashil rangli matn */
            outline: none;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        
        button {
            padding: 18px;
            font-size: 1.3rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #333;
            color: white;
        }
        
        button:hover {
            background-color: #444;
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0px);
        }
        
        .operator {
            background-color: #3d3d3d;
            color: #ff9500;
            font-weight: bold;
        }
        
        .equals {
            background-color: #ff9500;
            color: white;
            grid-column: span 1;
        }
        
        .clear {
            background-color: #ff3b30;
            color: white;
            grid-column: span 2;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">AC</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendToDisplay('/')">/</button>

            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>

            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>

            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>

            <button onclick="appendToDisplay('0')" style="grid-column: span 2;">0</button>
            <button onclick="appendToDisplay('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        // Sahifa yangilanganda ma'lumotni tiklash
        window.onload = () => {
            const savedValue = localStorage.getItem('calcValue');
            if (savedValue) display.value = savedValue;
        };

        function appendToDisplay(input) {
            display.value += input;
            save();
        }

        function clearDisplay() {
            display.value = "";
            save();
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
            save();
        }

        function calculate() {
            try {
                if (display.value === "") return;
                // Faqat ruxsat berilgan belgilarni hisoblash (xavfsizlik uchun)
                display.value = eval(display.value.replace(/[^-+*/.0-9]/g, ''));
                save();
            } catch (e) {
                display.value = "Xato";
                setTimeout(clearDisplay, 1000);
            }
        }

        function save() {
            localStorage.setItem('calcValue', display.value);
        }

        // --- KLAVIATURA BOSILGANDA ISHLASH ---
        document.addEventListener('keydown', (event) => {
            const key = event.key;

            // Raqamlar va amallar
            if ("0123456789+-*/.".includes(key)) {
                appendToDisplay(key);
            }
            // Enter bosilganda hisoblash
            else if (key === "Enter") {
                event.preventDefault(); // Sahifa yangilanib ketmasligi uchun
                calculate();
            }
            // Backspace bosilganda bittasini o'chirish
            else if (key === "Backspace") {
                deleteLast();
            }
            // Escape bosilganda hammasini tozalash
            else if (key === "Escape") {
                clearDisplay();
            }
        });
    </script>

</body>

</html>
